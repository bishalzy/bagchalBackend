
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      - REDIS_URL=redis://redis:6379
      - MODE=production
      - ALLOWED_HOST=https://baghchal.xyz
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: